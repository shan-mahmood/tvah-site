    - generic [ref=e11]:
      - paragraph [ref=e12]: About us
      - heading "Compassionate care for your pets." [level=1] [ref=e13]
      - paragraph [ref=e14]: Tustin Village Animal Hospital is more than just a veterinary practice — we are a doctor owned and operated walk-in clinic serving Orange County families and their pets. We provide comprehensive, high-quality care tailored to each pet’s needs at every life stage.
      - paragraph [ref=e15]: Our mission is to keep visits low-stress for both pets and owners by prioritizing physical, emotional, and behavioral well-being. From routine wellness exams to specialized treatments and life-saving surgeries, our goal is to help your pets live long, healthy lives by your side.
    - generic [ref=e17]:
      - heading "What we believe" [level=2] [ref=e19]
      - generic [ref=e20]:
        - generic [ref=e22]:
          - heading "Cost-effective, individualized care" [level=3] [ref=e23]
          - paragraph [ref=e24]: Rather than default to the most expensive solution, our veterinarians seek the most effective and appropriate one for your pet and your family. We explain our reasoning, lay out the options, and help you decide.
        - generic [ref=e26]:
          - heading "Walk-ins, six days a week" [level=3] [ref=e27]
          - paragraph [ref=e28]: Pets don't get sick on a schedule. We see same-day walk-ins for routine, urgent, and emergency visits — without requiring an appointment to get started.
        - generic [ref=e30]:
          - heading "Modern medicine, plain language" [level=3] [ref=e31]
          - paragraph [ref=e32]: In-house diagnostics, digital imaging, and partnerships with specialty labs. But you'll never leave a visit confused about what's happening or why.
        - generic [ref=e34]:
          - heading "Long-term relationships" [level=3] [ref=e35]
          - paragraph [ref=e36]: Same caring team every visit. We get to know your pet over years — their quirks, their history, what's normal for them — so we can catch what's not.
    - generic [ref=e40]:
      - img "The team at Tustin Village Animal Hospital" [ref=e42]
      - paragraph [ref=e43]: The team at Tustin Village Animal Hospital.
    - generic [ref=e46]:
      - heading "A trusted walk-in hospital" [level=2] [ref=e47]
      - generic [ref=e48]:
        - paragraph [ref=e49]: We are proud to serve as a trusted walk-in veterinary hospital dedicated to your pet’s lifelong health and well-being. Our team provides compassionate, high-quality care tailored to your pet’s individual needs — from routine wellness exams to advanced diagnostics and urgent medical treatment.
        - paragraph [ref=e50]: We’re a full-service hospital with an in-house lab, digital X-ray, ultrasound, dental, and surgical suites — and we’re also a walk-in clinic. That combination is unusual and deliberate. Routine care, urgent issues, and follow-ups all happen in the same place with the same caring team.
        - paragraph [ref=e51]: Whether you need same-day care or preventive services, our walk-in veterinary hospital is here when your pet needs us most. We focus on dogs and cats so we can do that work well.
